name: Grid OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86 gcc

      - name: Build
        run: make

      - name: Seed disk
        run: make disk seed-disk

      - name: Host tests
        run: make test-host

      - name: QEMU tests
        run: |
          make test-qemu-smoke
          make test-e2e

  macos-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install nasm qemu x86_64-elf-gcc

      - name: Build kernel and disk
        run: |
          make
          make disk seed-disk

      - name: Build Mac release bundles
        run: make release-mac

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grid-os-macos-v6.7
          path: dist/*

  windows-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc zip

      - name: Build kernel and disk
        run: |
          make
          make disk seed-disk

      - name: Build Windows release bundles
        run: make release-windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grid-os-windows-v6.7
          path: |
            dist/GridOS-*-Windows-x64.zip
            dist/grid-os-windows-x64-*.zip

  termux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc zip

      - name: Build kernel and disk
        run: |
          make
          make disk seed-disk

      - name: Build Android Termux release bundles
        run: make release-termux

      - name: Upload Termux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grid-os-termux-v6.7
          path: |
            dist/GridOS-*-Android-Termux.*
            dist/grid-os-android-termux-*.zip
